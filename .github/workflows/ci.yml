name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio pytest-cov hypothesis detect-secrets
          pip install -e . 2>/dev/null || pip install langgraph langchain langchain-openai pydantic python-dotenv pyyaml pypdf

      - name: detect-secrets scan
        run: detect-secrets scan --baseline .secrets.baseline

      - name: ruff check
        run: ruff check src/ tests/

      - name: ruff format
        run: ruff format --check src/ tests/

      - name: mypy
        run: python -m mypy src/

      - name: pytest
        run: python -m pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Build
        run: npm run build
